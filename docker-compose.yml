services:
  
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${DB_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  backend:
    build: ./Backend/TaskFlow.API
    ports:
      - "5110:5110"
    environment:
      ASPNETCORE_URLS: "http://+:5110"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=TaskFlowDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "TaskFlowAPI"
      Jwt__Audience: "TaskFlowClient"
    depends_on:
      db:
        condition: service_healthy
  
  frontend:
    build:
      context: ./Frontend/taskflow-client
      args:
        VITE_API_URL: "/api"
    ports:
      - "8090:80"
    depends_on:
      - backend

volumes:
  sqlserver-data: